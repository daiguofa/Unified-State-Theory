# .github/workflows/timestamp_daiguofa.yml
name: Add Time Stamp

on:
  push:
    branches:
      - main

jobs:
  timestamp_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append New Time Stamp (历史记录模式)
        run: |
          echo "--- 新提交 ---" >> timestamp.txt
          echo "时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> timestamp.txt
          echo "提交: ${{ github.sha }}" >> timestamp.txt
          echo "" >> timestamp.txt

      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add timestamp.txt
          git commit -m "Auto update timestamp [skip ci]" || exit 0
          git push
